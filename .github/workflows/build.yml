name: Build APK

on:
  workflow_dispatch:

jobs:
 build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - name: Get packages
        run: flutter pub get

      - name: Patch flutter_vibrate namespace
        run: |
          FILE=$(find ~/.pub-cache -path "*/flutter_vibrate-1.3.0/android/build.gradle" | head -n 1)
          echo "Patching: $FILE"
          sed -i '/android {/a\    namespace "com.example.flutter_vibrate"' "$FILE"
          cat "$FILE"

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
